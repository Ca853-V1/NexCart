version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: nexcart-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./server
    container_name: nexcart-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/nexcart
    depends_on:
      - mongodb

  frontend:
    build: ./client
    container_name: nexcart-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data: